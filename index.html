<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Magic Mirror V3 - Snapchat Pro Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #00f2fe;
            --premium-gold: #fec107;
            --premium-pro: #b100ff; /* $9.99 Filters වලට දම් පාට */
            --amoled-black: #000000;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body { 
            margin: 0; padding: 0; background-color: var(--amoled-black); color: #fff; 
            font-family: 'Poppins', sans-serif; overflow: hidden; height: 100vh;
        }

        /* Fullscreen App */
        .app-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }

        /* Header */
        .app-header { 
            position: absolute; top: 0; left: 0; width: 100%; padding: 20px;
            display: flex; align-items: center; justify-content: space-between; z-index: 100; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent); box-sizing: border-box;
        }
        .app-title { font-size: 20px; font-weight: 700; margin: 0; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .p-icon { font-size: 24px; cursor: pointer; }

        /* Camera */
        .mirror-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; overflow: hidden; }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); transition: filter 0.4s ease; }
        #canvas { display: none; }

        /* Shield Badge */
        .shield-status {
            position: absolute; top: 80px; left: 20px; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px);
            padding: 6px 12px; border-radius: 20px; display: flex; align-items: center; gap: 8px; border: 1px solid rgba(0, 255, 0, 0.3); z-index: 10;
        }
        .pulse-dot { width: 8px; height: 8px; background: #00ff00; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Filter Carousel */
        .filter-carousel-wrapper {
            position: absolute; bottom: 25px; left: 0; width: 100%; height: 130px; z-index: 100; display: flex; align-items: center;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }
        .filter-carousel {
            display: flex; gap: 15px; overflow-x: scroll; scroll-behavior: smooth;
            padding: 10px 40vw; /* Center padding */
            scrollbar-width: none;
        }
        .filter-carousel::-webkit-scrollbar { display: none; }

        .filter-item {
            min-width: 70px; height: 70px; border-radius: 50%; background-size: cover; background-position: center;
            border: 3px solid white; cursor: pointer; transition: 0.3s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            position: relative; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .filter-item.active { min-width: 85px; height: 85px; border-color: var(--primary-blue); box-shadow: 0 0 20px rgba(0, 242, 254, 0.6); }

        /* Premium Borders */
        .filter-item.locked-gold { border-color: var(--premium-gold); }
        .filter-item.locked-gold.active { box-shadow: 0 0 20px rgba(254, 193, 7, 0.6); }
        
        .filter-item.locked-pro { border-color: var(--premium-pro); }
        .filter-item.locked-pro.active { box-shadow: 0 0 20px rgba(177, 0, 255, 0.6); }

        .filter-item.locked-gold::after, .filter-item.locked-pro::after {
            content: ''; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.4); border-radius: 50%;
        }
        .lock-icon { position: absolute; font-size: 18px; z-index: 5; color: white; text-shadow: 0 0 5px rgba(0,0,0,0.8); }

        .filter-name {
            position: absolute; bottom: -28px; left: 50%; transform: translateX(-50%); font-size: 11px; font-weight: 600; 
            white-space: nowrap; color: white; opacity: 0; transition: 0.3s; text-shadow: 0 1px 4px #000;
        }
        .filter-item.active .filter-name { opacity: 1; }
        
        /* Price Tag for Pro */
        .price-tag {
            position: absolute; top: -10px; background: red; color: white; font-size: 9px; padding: 2px 6px; 
            border-radius: 10px; font-weight: bold; z-index: 10; border: 1px solid white; opacity: 0; transition: 0.3s;
        }
        .filter-item.active .price-tag { opacity: 1; }

        /* Capture Button */
        .capture-btn-wrapper { position: absolute; bottom: 140px; left: 50%; transform: translateX(-50%); z-index: 150; text-align: center; }
        .capture-btn { width: 75px; height: 75px; border-radius: 50%; background: rgba(255,255,255,0.9); border: 5px solid rgba(255,255,255,0.4); box-shadow: 0 0 20px rgba(0,0,0,0.5); cursor: pointer; outline: none; transition: 0.2s; }
        .capture-btn:active { transform: scale(0.9); }

        /* Dynamic Modal */
        .premium-modal {
            display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9); backdrop-filter: blur(8px); align-items: center; justify-content: center; opacity: 0; transition: 0.3s;
        }
        .premium-modal.active { display: flex; opacity: 1; }
        .premium-content { width: 85%; max-width: 350px; text-align: center; position: relative; padding: 30px; border-radius: 25px; background: #111; border: 2px solid var(--premium-gold); animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .btn-fancy { width: 100%; color: #000; border: none; padding: 16px; border-radius: 30px; font-weight: 700; font-size: 15px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-fancy:active { transform: scale(0.97); }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <h1 class="app-title">Magic Mirror</h1>
            <div class="p-icon" onclick="alert('Profile Coming Soon!')">👤</div>
        </header>

        <div class="mirror-container">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
            
            <div class="shield-status">
                <div class="pulse-dot"></div>
                <span style="font-size: 11px; color: #00ff00; font-weight: 700;">SHIELD ACTIVE</span>
            </div>
        </div>

        <div class="filter-carousel-wrapper">
            <div class="filter-carousel" id="filter-carousel">
                </div>
        </div>

        <div class="capture-btn-wrapper">
            <button class="capture-btn" onclick="captureHighQualImage()"></button>
            <div style="font-size: 11px; margin-top: 8px; text-shadow: 0 1px 3px #000; font-weight: bold;">TAP TO CAPTURE</div>
        </div>
    </div>

    <div class="premium-modal" id="premiumModal">
        <div class="premium-content" id="modalBox">
            <span style="position: absolute; top: 15px; right: 20px; color: #aaa; font-size: 28px; cursor: pointer;" onclick="closeModal()">&times;</span>
            <div style="font-size: 45px; margin-bottom: 10px;" id="modalIcon">💎</div>
            <h2 style="margin-top: 0; font-size: 22px;" id="modalTitle">Unlock Filter</h2>
            <p style="color: #aaa; font-size: 13px; margin-bottom: 20px;">
                Upgrade to access the exclusive <strong id="modalFilterName" style="color:white;">Filter</strong> and enhance your shielded photos.
            </p>
            <button class="btn-fancy" id="modalBtn">
                Buy Filter
            </button>
            <p style="font-size: 10px; color: #666; margin-top: 15px;">Powered by Zentech AI Studio</p>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const carousel = document.getElementById('filter-carousel');
        
        let currentFilterCSS = 'none';

        // --- DYNAMIC FILTER ARRAY (We can easily add 50+ here) ---
        // Types: 'free', 'gold' ($4.99), 'pro' ($9.99)
        const filtersData = [
            { id: 'f1', name: 'Normal', type: 'free', css: 'none' },
            { id: 'f2', name: 'Vintage', type: 'free', css: 'sepia(0.6) contrast(1.1) brightness(0.9)' },
            { id: 'f3', name: 'B&W', type: 'free', css: 'grayscale(1) contrast(1.2)' },
            { id: 'f4', name: 'Cool Tint', type: 'free', css: 'hue-rotate(180deg) saturate(1.2)' },
            
            // Gold Tier ($4.99)
            { id: 'f5', name: 'Cyberpunk', type: 'gold', price: '$4.99', css: 'hue-rotate(110deg) saturate(2) contrast(1.2)' },
            { id: 'f6', name: 'Neon Glow', type: 'gold', price: '$4.99', css: 'saturate(2.5) hue-rotate(30deg) contrast(1.4)' },
            { id: 'f7', name: 'Glamour', type: 'gold', price: '$4.99', css: 'contrast(1.1) brightness(1.1) saturate(1.3) sepia(0.1)' },
            { id: 'f8', name: 'Mars Red', type: 'gold', price: '$4.99', css: 'sepia(1) hue-rotate(320deg) saturate(3)' },
            { id: 'f9', name: 'Matrix', type: 'gold', price: '$4.99', css: 'hue-rotate(80deg) saturate(2) brightness(0.8)' },
            
            // Pro/Elite Tier ($9.99) - Insane effects
            { id: 'f10', name: 'Thermal Pro', type: 'pro', price: '$9.99', css: 'invert(1) hue-rotate(180deg) saturate(3)' },
            { id: 'f11', name: 'Ghost', type: 'pro', price: '$9.99', css: 'grayscale(1) invert(1) blur(1px)' },
            { id: 'f12', name: 'Dark Soul', type: 'pro', price: '$9.99', css: 'contrast(1.5) brightness(0.7) grayscale(0.8)' },
            { id: 'f13', name: 'Trippy', type: 'pro', price: '$9.99', css: 'saturate(4) hue-rotate(240deg) contrast(1.3)' },
            { id: 'f14', name: 'Golden Royal', type: 'pro', price: '$9.99', css: 'sepia(0.8) saturate(2.5) brightness(1.1) contrast(1.2)' }
        ];

        // --- Inject Filters into HTML ---
        function renderFilters() {
            let html = '';
            filtersData.forEach((f, index) => {
                let lockedClass = '';
                let iconHtml = '';
                let priceTagHtml = '';

                if (f.type === 'gold') {
                    lockedClass = 'locked-gold';
                    iconHtml = '<span class="lock-icon">🔒</span>';
                } else if (f.type === 'pro') {
                    lockedClass = 'locked-pro';
                    iconHtml = '<span class="lock-icon">👑</span>'; // Crown for $9.99
                    priceTagHtml = `<div class="price-tag">${f.price}</div>`;
                }

                const isActive = index === 0 ? 'active' : '';

                // Random images from Unsplash/Picsum to make it look like real filters
                const bgImg = `https://picsum.photos/100/100?random=${index + 20}`;

                html += `
                <div class="filter-item ${lockedClass} ${isActive}" 
                     onclick="handleFilterClick(${index}, this)" 
                     style="background-image: url('${bgImg}');">
                    ${priceTagHtml}
                    ${iconHtml}
                    <span class="filter-name">${f.name}</span>
                </div>
                `;
            });
            carousel.innerHTML = html;
        }

        // --- Handle Clicks (Free vs Premium) ---
        function handleFilterClick(index, element) {
            const filter = filtersData[index];

            // 1. UI Updates (Scroll to center)
            document.querySelectorAll('.filter-item').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');

            const carouselRect = carousel.getBoundingClientRect();
            const elementRect = element.getBoundingClientRect();
            const scrollOffset = elementRect.left - carouselRect.left - (carouselRect.width / 2) + (elementRect.width / 2);
            carousel.scrollBy({ left: scrollOffset, behavior: 'smooth' });

            // 2. Premium Logic
            if (filter.type !== 'free') {
                showModal(filter);
                // We keep the previous CSS filter active visually while modal shows
            } else {
                // Free filter - apply immediately
                video.style.filter = filter.css;
                currentFilterCSS = filter.css;
            }
        }

        // --- Dynamic Premium Modal ---
        function showModal(filterData) {
            const modal = document.getElementById('premiumModal');
            const box = document.getElementById('modalBox');
            const title = document.getElementById('modalTitle');
            const nameSpan = document.getElementById('modalFilterName');
            const btn = document.getElementById('modalBtn');
            const icon = document.getElementById('modalIcon');

            nameSpan.innerText = filterData.name;

            if(filterData.type === 'pro') {
                box.style.borderColor = 'var(--premium-pro)';
                title.style.color = 'var(--premium-pro)';
                title.innerText = 'Unlock Elite Pro';
                icon.innerText = '👑';
                btn.style.background = 'linear-gradient(135deg, #b100ff 0%, #ff007f 100%)';
                btn.innerText = `Buy Elite Pack - ${filterData.price}`;
            } else {
                box.style.borderColor = 'var(--premium-gold)';
                title.style.color = 'var(--premium-gold)';
                title.innerText = 'Unlock Premium';
                icon.innerText = '💎';
                btn.style.background = 'linear-gradient(135deg, var(--premium-gold) 0%, #ff9800 100%)';
                btn.innerText = `Buy Access - ${filterData.price}`;
            }

            modal.classList.add('active');
        }

        function closeModal() { document.getElementById('premiumModal').classList.remove('active'); }

        // --- Camera & Capture ---
        async function startMirror() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: { ideal: 1920 } }, audio: false });
                video.srcObject = stream; video.play();
            } catch (err) { alert("Camera access required."); }
        }

        function captureHighQualImage() {
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            ctx.filter = currentFilterCSS;
            
            ctx.save(); ctx.scale(-1, 1);
            ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
            ctx.restore();
            
            ctx.filter = 'none';

            // Shield Noise
            let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let d = imgData.data;
            for (let i = 0; i < d.length; i += 4) {
                let n = (Math.random() - 0.5) * 8;
                d[i] += n; d[i+1] += n; d[i+2] += n;
            }
            ctx.putImageData(imgData, 0, 0);

            // Watermark
            ctx.font = `700 ${canvas.width * 0.04}px 'Poppins'`;
            ctx.shadowColor = "rgba(0,0,0,0.8)"; ctx.shadowBlur = 10; ctx.fillStyle = "rgba(255,255,255,0.8)";
            ctx.fillText("Magic Mirror V3 | Zentech AI", canvas.width - 550, canvas.height - 30);

            const link = document.createElement('a'); 
            link.download = `Zentech_Shielded_${Date.now()}.png`;
            link.href = canvas.toDataURL("image/png", 1.0); link.click();
        }

        // Start App
        window.addEventListener('load', () => {
            renderFilters();
            startMirror();
        });
    </script>
</body>
</html>
